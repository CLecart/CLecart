name: GitHub-Profile-Summary-Cards

on:
  schedule: # Exécute le script tous les jours à minuit
    - cron: "0 0 * * *"
  workflow_dispatch: # Permet de lancer le script manuellement depuis l'interface GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          UTC_OFFSET: 1
          EXCLUDE: ""
          AUTO_PUSH: false
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update profile summary cards" || echo "No changes to commit"
          git push
